name: Sync Gmail

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Gmail sync
        run: |
          curl -sf -X GET "https://beni-dashboard.vercel.app/api/cron/sync-gmail" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
